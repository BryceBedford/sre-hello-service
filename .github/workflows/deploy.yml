script: |
  set -e

  cd ~/sre-hello-service
  git pull origin main

  # Stop old container if exists
  docker rm -f sre-hello 2>/dev/null || true

  # Build new image
  docker build -t sre-hello:latest .

  # Run new container
  docker run -d \
    --name sre-hello \
    --restart unless-stopped \
    -p 127.0.0.1:5000:5000 \
    sre-hello:latest

  # Health check
  curl -fsS http://127.0.0.1:5000/healthz > /dev/null

  echo "Deployment successful"
