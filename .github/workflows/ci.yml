name: CI - Build & Smoke Test Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t sre-hello:ci .

      - name: Run container
        run: |
          docker rm -f sre-hello-ci 2>/dev/null || true
          docker run -d --name sre-hello-ci -p 5000:5000 sre-hello:ci
          docker ps

      - name: Smoke test /healthz
        run: |
          # wait a moment for app to boot
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:5000/healthz > /dev/null; then
              echo "Health check OK"
              exit 0
            fi
            echo "Waiting for app... ($i/15)"
            sleep 2
          done

          echo "Health check FAILED - dumping logs"
          docker logs sre-hello-ci || true
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f sre-hello-ci 2>/dev/null || true
