name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t sre-hello-ci .

      - name: Run container
        run: |
          docker rm -f sre-hello-ci 2>/dev/null || true
          docker run -d --name sre-hello-ci -p 5000:5000 sre-hello-ci
          docker ps
          
      - name: Debug container logs
        if:: always()
        run:  |
          docker ps -a
          docker logs sre-hello-ci || true
      
      - name: Smoke test /healthz
        run: |
          # give it a couple seconds to boot
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:5000/healthz >/dev/null; then
              echo "healthz OK"
              exit 0
            fi
            sleep 1
          done
          echo "healthz FAILED"
          docker logs sre-hello-ci
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f sre-hello-ci 2>/dev/null || true
